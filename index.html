<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar With Dark Mode</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
   <header>

    <div class="container">

        <!-- LOGO -->
        <h1 class="logo">&lt;/GM&gt;</h1>

        <!-- RIGHT SIDE -->
        <div class="nav-right">

            <!-- HAMBURGER MENU -->
            <div class="menu-toggle" id="menu-toggle">
                ☰
            </div>

          

        </div>

        <!-- NAVBAR -->
        <nav>

            <ul id="nav-links">

                <li>Home</li>
                <li>Service</li>
                <li>About</li>
                <li>Contact</li>

            </ul>

        </nav>
  <!-- DARK MODE TOGGLE -->
            <div class="toggle-btn">

                <input type="checkbox" id="checkbox">

                <label for="checkbox" class="toggle-label">
                    <span class="toggle-ball"></span>
                </label>

            </div>
    </div>

</header>

    <!-- MAIN SECTION -->
    <main>

        <div class="main">

            <!-- TEXT -->
            <div class="text">

                <h1 class="heading-h1">
                    Mern Stack Web Development
                </h1>

                <h2 class="h2">
                    Click on Button For Get Description
                </h2>

                <button class="button-text">
                    Get Now
                </button>

            </div>

            <!-- IMAGE -->
            <img src="https://img.freepik.com/free-photo/web-design-concept-with-drawings_1134-77.jpg?semt=ais_hybrid&w=740&q=80"
                alt="Web Development Image" class="img">

        </div>

    </main>

    <!-- JAVASCRIPT -->
    <script src="script.js"></script>

</body>

</html>
