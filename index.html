<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Dark / Light Mode Toggle</title>
</head>

<body>

    <header>
        <div class="container">

            <h1 class="logo">&lt;/GM&gt;</h1>

            <nav>
                <ul>
                    <li>Home</li>
                    <li>Service</li>
                    <li>About Us</li>
                    <li>Contact</li>

                    <li>
                        <div class="toggle-btn">

                            <input type="checkbox" id="checkbox">

                            <label for="checkbox" class="toggle-label">
                                <span class="toggle-ball"></span>
                            </label>

                        </div>
                    </li>
                </ul>
            </nav>

        </div>
    </header>

    <!-- <hr> -->

    <main>

        <div class="main">

            <div class="text">

                <h1 class="heading-h1">
                    Mern Stack Web Development
                </h1>

                <h2 class="h2">
                    Click on Button For Get Description
                </h2>

                <button class="button-text">
                    Get Now
                </button>

            </div>

            <img src="https://img.freepik.com/free-photo/web-design-concept-with-drawings_1134-77.jpg?semt=ais_hybrid&w=740&q=80"
                alt="Web Development" class="img">

        </div>

    </main>

    <script src="script.js"></script>

</body>

</html>
